name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - release

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 60
    env:
      CI: true
      RUST_BACKTRACE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis --no-progress -y
          $nsisPath = "C:\Program Files (x86)\NSIS"
          if (Test-Path $nsisPath) {
            Add-Content -Path $env:GITHUB_PATH -Value $nsisPath
          }

      - name: Print tool versions
        shell: pwsh
        run: |
          node --version
          npm --version
          rustc --version
          cargo --version
          makensis -VERSION

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify local toolchain
        shell: pwsh
        run: |
          if (!(Test-Path ".\\node_modules\\.bin\\tsc.cmd")) { throw "tsc.cmd is missing after npm ci" }
          if (!(Test-Path ".\\node_modules\\.bin\\tauri.cmd")) { throw "tauri.cmd is missing after npm ci" }
          .\\node_modules\\.bin\\tsc.cmd --version
          .\\node_modules\\.bin\\tauri.cmd --version

      - name: Download sing-box sidecar
        shell: pwsh
        run: |
          ./scripts/download-singbox.ps1
          if (!(Test-Path "./src-tauri/resources/bin/sing-box.exe")) {
            throw "sing-box.exe was not downloaded"
          }

      - name: TypeScript check
        run: npm run lint:check

      - name: Build frontend
        run: npm run build

      - name: Build Windows installer
        shell: pwsh
        run: .\\node_modules\\.bin\\tauri.cmd build -- --bundles nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cakibra-sbp-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/*.exe
