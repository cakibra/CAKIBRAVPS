name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - release

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 60
    defaults:
      run:
        shell: pwsh
    env:
      CI: true
      RUST_BACKTRACE: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install NSIS
        run: |
          choco install nsis --no-progress -y
          $nsisPath = "C:\Program Files (x86)\NSIS"
          if (Test-Path $nsisPath) {
            Add-Content -Path $env:GITHUB_PATH -Value $nsisPath
          }

      - name: Print tool versions
        run: |
          node --version
          npm --version
          rustc --version
          cargo --version
          makensis -VERSION

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify required packages
        run: |
          node -e "console.log('tsc:', require.resolve('typescript/bin/tsc'))"
          node -e "console.log('vite:', require.resolve('vite/bin/vite.js'))"
          node -e "console.log('tauri:', require.resolve('@tauri-apps/cli/tauri.js'))"

      - name: Download sing-box sidecar
        run: |
          ./scripts/download-singbox.ps1
          if (!(Test-Path ".\src-tauri\resources\bin\sing-box.exe")) {
            throw "sing-box.exe was not downloaded"
          }

      - name: TypeScript check
        run: npm run lint:check

      - name: Build frontend
        run: npm run build

      - name: Build Windows installer
        run: npm run tauri build -- --bundles nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cakibra-sbp-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/*.exe
