name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - release

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 60
    defaults:
      run:
        shell: pwsh
    env:
      CI: true
      NODE_ENV: development
      NPM_CONFIG_PRODUCTION: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install NSIS
        run: |
          choco install nsis --no-progress -y
          $nsisPath = "C:\Program Files (x86)\NSIS"
          if (Test-Path $nsisPath) {
            Add-Content -Path $env:GITHUB_PATH -Value $nsisPath
          }

      - name: Install dependencies
        run: |
          npm config delete production
          npm ci --no-audit --no-fund

      - name: Show installed Tauri versions
        run: |
          node -e "console.log('api', require('./node_modules/@tauri-apps/api/package.json').version)"
          node -e "console.log('cli', require('./node_modules/@tauri-apps/cli/package.json').version)"

      - name: Download sing-box sidecar
        run: |
          ./scripts/download-singbox.ps1
          if (!(Test-Path "./src-tauri/resources/bin/sing-box.exe")) {
            throw "sing-box.exe was not downloaded"
          }

      - name: TypeScript check
        run: npm run lint:check

      - name: Build frontend
        run: npm run build

      - name: Build Windows installer
        run: npm run tauri build -- --bundles nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cakibra-sbp-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/*.exe
