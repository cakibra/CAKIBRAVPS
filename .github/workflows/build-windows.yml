name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - release

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 60
    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis --no-progress -y
          $nsisPath = "C:\Program Files (x86)\NSIS"
          if (Test-Path $nsisPath) {
            Add-Content -Path $env:GITHUB_PATH -Value $nsisPath
          }

      - name: Reset npm state
        shell: pwsh
        run: |
          if (Test-Path node_modules) {
            Remove-Item node_modules -Recurse -Force
          }
          npm cache clean --force

      - name: Install dependencies
        run: npm install --include=dev --no-audit --no-fund

      - name: Force-install required frontend packages
        run: >-
          npm install --no-audit --no-fund
          react@18.3.1 react-dom@18.3.1 lucide-react@0.511.0 framer-motion@11.15.0 @tauri-apps/api@2.8.0
          && npm install --save-dev --no-audit --no-fund
          typescript@5.8.3 vite@6.3.5 @vitejs/plugin-react@4.4.1 @types/react@18.3.18 @types/react-dom@18.3.5 @tauri-apps/cli@2.8.2

      - name: TypeScript check
        run: npm run lint:check

      - name: Build frontend
        run: npm run build

      - name: Download sing-box sidecar
        shell: pwsh
        run: ./scripts/download-singbox.ps1

      - name: Build Windows installer
        run: npm run tauri build -- --bundles nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cakibra-sbp-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/*.exe
