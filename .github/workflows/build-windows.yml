name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - release

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 60
    defaults:
      run:
        shell: pwsh
    env:
      CI: true
      RUST_BACKTRACE: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install NSIS
        run: |
          choco install nsis --no-progress -y
          $nsisPath = "C:\Program Files (x86)\NSIS"
          if (Test-Path $nsisPath) {
            Add-Content -Path $env:GITHUB_PATH -Value $nsisPath
          }

      - name: Install npm dependencies
        run: |
          npm config delete production
          npm ci --no-audit --no-fund
          npm install --no-save typescript@5.8.3 vite@6.3.5 @tauri-apps/cli@2.8.2 @tauri-apps/api@2.8.0 @vitejs/plugin-react@4.4.1 @types/react@18.3.18 @types/react-dom@18.3.5
          npm ls typescript vite @tauri-apps/cli @tauri-apps/api --depth=0

      - name: Download sing-box sidecar
        run: |
          ./scripts/download-singbox.ps1
          if (!(Test-Path ".\src-tauri\resources\bin\sing-box.exe")) {
            throw "sing-box.exe was not downloaded"
          }

      - name: TypeScript check
        run: npm run lint:check

      - name: Build frontend
        run: npm run build

      - name: Build Windows installer
        run: npm run tauri build -- --bundles nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cakibra-sbp-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/*.exe
