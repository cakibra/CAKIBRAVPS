name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - release

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 60
    defaults:
      run:
        shell: pwsh
    env:
      CI: true
      RUST_BACKTRACE: "1"
      NPM_CONFIG_PRODUCTION: "false"
      NODE_ENV: development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install NSIS
        run: |
          choco install nsis --no-progress -y
          $nsisPath = "C:\Program Files (x86)\NSIS"
          if (Test-Path $nsisPath) {
            Add-Content -Path $env:GITHUB_PATH -Value $nsisPath
          }

      - name: Print tool versions
        run: |
          node --version
          npm --version
          rustc --version
          cargo --version
          makensis -VERSION

      - name: Install project dependencies
        run: |
          npm config delete production
          npm ci --include=dev --no-audit --no-fund

      - name: Force-install local build toolchain
        run: |
          npm install --no-save --no-audit --no-fund `
            typescript@^5.8.3 `
            vite@^6.3.5 `
            @tauri-apps/cli@^2.8.0 `
            @vitejs/plugin-react@^4.4.1 `
            @types/react@^18.3.18 `
            @types/react-dom@^18.3.5

      - name: Verify local binaries
        run: |
          if (!(Test-Path ".\node_modules\.bin\tsc.cmd")) {
            Write-Host "Contents of node_modules/.bin:"
            if (Test-Path ".\node_modules\.bin") { Get-ChildItem .\node_modules\.bin | Select-Object Name }
            throw "tsc.cmd is missing after dependency installation"
          }
          if (!(Test-Path ".\node_modules\.bin\vite.cmd")) {
            Write-Host "Contents of node_modules/.bin:"
            if (Test-Path ".\node_modules\.bin") { Get-ChildItem .\node_modules\.bin | Select-Object Name }
            throw "vite.cmd is missing after dependency installation"
          }
          if (!(Test-Path ".\node_modules\.bin\tauri.cmd")) {
            Write-Host "Contents of node_modules/.bin:"
            if (Test-Path ".\node_modules\.bin") { Get-ChildItem .\node_modules\.bin | Select-Object Name }
            throw "tauri.cmd is missing after dependency installation"
          }
          .\node_modules\.bin\tsc.cmd --version
          .\node_modules\.bin\vite.cmd --version
          .\node_modules\.bin\tauri.cmd --version

      - name: Download sing-box sidecar
        run: |
          ./scripts/download-singbox.ps1
          if (!(Test-Path ".\src-tauri\resources\bin\sing-box.exe")) {
            throw "sing-box.exe was not downloaded"
          }

      - name: TypeScript check
        run: .\node_modules\.bin\tsc.cmd --noEmit

      - name: Build frontend
        run: npm run build

      - name: Build Windows installer
        run: .\node_modules\.bin\tauri.cmd build -- --bundles nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cakibra-sbp-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/*.exe
