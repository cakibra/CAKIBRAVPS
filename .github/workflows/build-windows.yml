name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - release

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 90
    defaults:
      run:
        shell: pwsh
    env:
      CI: 'true'
      RUST_BACKTRACE: '1'
      NODE_ENV: development
      NPM_CONFIG_PRODUCTION: 'false'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install NSIS
        run: |
          choco install nsis --no-progress -y
          $nsisPath = 'C:\Program Files (x86)\NSIS'
          if (Test-Path $nsisPath) {
            Add-Content -Path $env:GITHUB_PATH -Value $nsisPath
          }

      - name: Print tool versions
        run: |
          node --version
          npm --version
          rustc --version
          cargo --version
          makensis -VERSION

      - name: Install frontend dependencies
        run: |
          npm config delete production
          npm config set fund false
          npm config set audit false
          if (Test-Path '.\node_modules') { Remove-Item '.\node_modules' -Recurse -Force }
          npm install --include=dev --no-package-lock
          npm install --include=dev --no-save react@18.3.1 react-dom@18.3.1 framer-motion@11.18.2 lucide-react@0.511.0 @tauri-apps/api@2.10.1 @tauri-apps/cli@2.8.2 @tauri-apps/cli-win32-x64-msvc@2.8.2 @types/react@18.3.18 @types/react-dom@18.3.5 @vitejs/plugin-react@4.4.1 typescript@5.8.3 vite@6.3.5
          npm ls react react-dom framer-motion lucide-react @tauri-apps/api @tauri-apps/cli typescript vite --depth=0

      - name: Verify local toolchain
        run: |
          if (!(Test-Path '.\node_modules\typescript\bin\tsc')) { throw 'typescript runtime is missing' }
          if (!(Test-Path '.\node_modules\vite\bin\vite.js')) { throw 'vite runtime is missing' }
          if (!(Test-Path '.\node_modules\@tauri-apps\cli\tauri.js')) { throw 'tauri runtime is missing' }
          node .\node_modules\typescript\bin\tsc --version
          node .\node_modules\vite\bin\vite.js --version
          node .\node_modules\@tauri-apps\cli\tauri.js --version

      - name: Download sing-box sidecar
        run: |
          ./scripts/download-singbox.ps1
          if (!(Test-Path '.\src-tauri\resources\bin\sing-box.exe')) {
            throw 'sing-box.exe was not downloaded'
          }

      - name: TypeScript check
        run: npm run lint:check

      - name: Build frontend
        run: npm run build

      - name: Build Windows installer
        run: npm run tauri build -- --bundles nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cakibra-sbp-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/*.exe
